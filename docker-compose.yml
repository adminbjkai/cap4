services:
  postgres:
    image: postgres:16-alpine
    # container_name: cap3-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-app}
      POSTGRES_DB: ${POSTGRES_DB:-cap3}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/migrations:/migrations:ro
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-app} -d ${POSTGRES_DB:-cap3}" ]
      interval: 5s
      timeout: 3s
      retries: 20

  minio:
    image: minio/minio:RELEASE.2025-01-20T14-49-07Z
    # container_name: cap3-minio
    restart: unless-stopped
    # Console always binds to 9001 inside the container; host port is controlled by MINIO_CONSOLE_PORT.
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minio123}
    ports:
      - "${MINIO_PORT:-8922}:9000"
      - "${MINIO_CONSOLE_PORT:-8923}:9001"
    volumes:
      - minio_data:/data

  minio-setup:
    image: minio/mc:RELEASE.2025-01-17T23-25-50Z
    # container_name: cap3-minio-setup
    depends_on:
      - minio
    volumes:
      - ./docker/minio/cors.json:/config/cors.json:ro
    entrypoint: >
      /bin/sh -c " until mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-minio} ${MINIO_ROOT_PASSWORD:-minio123}; do sleep 1; done && mc mb -p local/${S3_BUCKET:-cap3} || true && mc anonymous set public local/${S3_BUCKET:-cap3} || true && mc cors set local/${S3_BUCKET:-cap3} /config/cors.json || true "

  web-api:
    build:
      context: .
      dockerfile: Dockerfile
    image: cap3-web-api:prod
    # container_name: cap3-web-api
    restart: unless-stopped
    command: pnpm --filter @cap/web-api start
    env_file:
      - .env
    environment:
      CI: "1"
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL:-postgres://app:app@postgres:5432/cap3}
      WEB_API_PORT: 3000
      MEDIA_SERVER_BASE_URL: http://media-server:3100
    ports:
      - "${WEB_API_PORT:-3000}:3000"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
      minio-setup:
        condition: service_completed_successfully
    healthcheck:
      test: [ "CMD-SHELL", "node -e \"fetch('http://localhost:3000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\"" ]
      interval: 5s
      timeout: 3s
      retries: 20

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    image: cap3-worker:prod
    # container_name: cap3-worker
    restart: unless-stopped
    command: pnpm --filter @cap/worker start
    env_file:
      - .env
    environment:
      CI: "1"
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL:-postgres://app:app@postgres:5432/cap3}
    depends_on:
      postgres:
        condition: service_healthy

  media-server:
    build:
      context: .
      dockerfile: Dockerfile
    image: cap3-media-server:prod
    # container_name: cap3-media-server
    restart: unless-stopped
    command: pnpm --filter @cap/media-server start
    env_file:
      - .env
    environment:
      CI: "1"
      NODE_ENV: production
      MEDIA_SERVER_PORT: 3100
      WEB_API_BASE_URL: http://web-api:3000
    ports:
      - "${MEDIA_SERVER_PORT:-3100}:3100"
    depends_on:
      web-api:
        condition: service_healthy

  web-internal:
    image: nginx:alpine
    # container_name: cap3-web-internal
    restart: unless-stopped
    ports:
      - "8022:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - web_dist:/usr/share/nginx/html:ro
    depends_on:
      web-api:
        condition: service_healthy

  web-builder:
    build:
      context: .
      dockerfile: Dockerfile
    image: cap3-web-builder:prod
    # container_name: cap3-web-builder
    command: [ "sh", "-c", "cp -rv /workspace/apps/web/dist/* /dist/" ]
    volumes:
      - web_dist:/dist

volumes:
  postgres_data:
  minio_data:
  web_dist:
